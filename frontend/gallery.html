<!DOCTYPE html>
<html lang="bg">
<head>

  <link rel="icon" type="image/svg+xml" href="/images/logo.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="https://unpkg.com/aos@2.3.4/dist/aos.css" />

  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div id="siteHeader"></div>

  <section class="page-banner">
    <div class="container" data-aos="fade-up">
      <div class="breadcrumbs"><a href="/">Начало</a><span>›</span>Галерия</div>
      <span class="eyebrow">Галерия</span>
      <h1 data-content="gallery_title">Нашата клиника отвътре</h1>
      <p data-content="gallery_intro">Модерни, чисти и уютни кабинети, създадени за вашия комфорт.</p>
    </div>
  </section>

  <section class="section">
    <div class="container">
      <div class="gallery-stories" data-aos="fade-up">
        <div class="swiper gallery-swiper">
          <div class="swiper-wrapper" id="galleryGrid"></div>
          <div class="swiper-pagination"></div>

        <button class="story-nav story-prev" aria-label="Назад"><i class="fa-solid fa-chevron-left"></i></button>
        <button class="story-nav story-next" aria-label="Напред"><i class="fa-solid fa-chevron-right"></i></button>

      </div>
    </div>
  </section>

  <section class="section section-cream">
    <div class="container"><div class="cta-band" data-aos="zoom-in" data-cta-eyebrow="Заповядайте при нас" data-cta-title="Убедете се сами на живо" data-cta-text="Запазете час и усетете нашата грижа, спокойна атмосфера и модерна среда."></div></div>
  </section>

  <div id="siteFooter"></div>
